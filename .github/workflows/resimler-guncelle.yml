name: Resimleri Otomatik Listele

on:
  push:
    branches: [ main ]
    paths:
      - '**.jpg'
      - '**.jpeg'
      - '**.png'
      - '**.webp'
      - '**.gif'
      - 'scripts/generate-gallery.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gallery:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Galeri listesini oluştur
        run: node scripts/generate-gallery.js
      - name: Değişiklikleri kaydet
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'resimler.json otomatik güncellendi'
          file_pattern: resimler.json
